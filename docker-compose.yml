version: "3.9"

services:
  db:
    image: postgres:16
    container_name: taskapi-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: taskapi-app

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - "8000:8000"

volumes:
  postgres_data: